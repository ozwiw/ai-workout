<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ Счетчик Отжиманий</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { margin: 5px 0; color: #00ff88; font-size: 1.8rem; }
        p { margin-bottom: 15px; color: #ccc; text-align: center; font-size: 0.9rem; }
        
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 480px; /* Оптимизировано под вертикальные экраны телефонов */
            aspect-ratio: 4/3;
        }
        
        /* Важно: видео теперь НЕ скрываем полностью, а накладываем канвас ПОВЕРХ него */
        video { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            transform: scaleX(-1);
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            transform: scaleX(-1); 
        }
        
        .scoreboard {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            background: #1e1e1e;
            padding: 10px 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            justify-content: space-around;
        }
        .stat { text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: bold; color: #00ff88; }
        .stat-lbl { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>ИИ Счетчик</h1>
    <p>Встань боком, чтобы ИИ видел плечо, локоть и запястье</p>

    <div class="container">
        <video id="webcam" autoplay playsinline muted loop></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="scoreboard">
        <div class="stat">
            <div id="counter" class="stat-val">0</div>
            <div class="stat-lbl">Повторы</div>
        </div>
        <div class="stat">
            <div id="stage" class="stat-val">---</div>
            <div class="stat-lbl">Стадия</div>
        </div>
        <div class="stat">
            <div id="angleDisplay" class="stat-val">0°</div>
            <div class="stat-lbl">Угол</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const counterDiv = document.getElementById('counter');
        const stageDiv = document.getElementById('stage');
        const angleDiv = document.getElementById('angleDisplay');

        let count = 0;
        let stage = "up";

        function calculateAngle(A, B, C) {
            let radians = Math.atan2(C.y - B.y, C.x - B.x) - Math.atan2(A.y - B.y, A.x - B.x);
            let angle = Math.abs((radians * 180.0) / Math.PI);
            if (angle > 180.0) angle = 360.0 - angle;
            return Math.round(angle);
        }

        function onResults(results) {
            // Подгоняем внутренний размер холста под реальный размер видео на экране
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Видео теперь играет само на заднем плане, а тут мы рисуем ТОЛЬКО скелет поверх прозрачного фона
            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTORS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 1, radius: 4});

                // Используем левую сторону (11, 13, 15)
                const shoulder = results.poseLandmarks[11];
                const elbow = results.poseLandmarks[13];
                const wrist = results.poseLandmarks[15];

                if (shoulder && elbow && wrist) {
                    const angle = calculateAngle(shoulder, elbow, wrist);
                    angleDiv.innerText = angle + "°";

                    if (angle > 160) {
                        stage = "up";
                        stageDiv.innerText = "Вверху";
                        stageDiv.style.color = "#00ff88";
                    }
                    if (angle < 90 && stage === "up") {
                        stage = "down";
                        stageDiv.innerText = "Внизу!";
                        stageDiv.style.color = "#ff3333";
                        count++;
                        counterDiv.innerText = count;
                    }
                }
            }
            canvasCtx.restore();
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        // modelComplexity: 0 — это супер-важно для мобилок! Переключает на облегченную модель, что дает высокий FPS
        pose.setOptions({
            modelComplexity: 0, 
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        // Плавный запуск стрима: ждем пока камера реально включится
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
            audio: false
        }).then((stream) => {
            videoElement.srcObject = stream;
            
            // Начинаем слать кадры в ИИ только после того, как видео пошло
            videoElement.addEventListener('loadeddata', () => {
                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await pose.send({image: videoElement});
                    }
                });
                camera.start();
            });
        }).catch(err => {
            alert("Ошибка камеры. Дай доступ браузеру к камере в настройках телефона.");
        });
    </script>
</body>
</html>
